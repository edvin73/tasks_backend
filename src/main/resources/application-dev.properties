spring.application.name=task_app


server.port=${PORT:8032}


#oracle datasource
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521:xe}
spring.datasource.username=${DB_USERNAME:devdb}
spring.datasource.password=${DB_PASSWORD:oracle}

#hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
 
logging.level.org.hibernate.SQL=trace
logging.level.com.example.task_app=debug
logging.level.org.springframework.boot.security=debug

# Change the path from /swagger-ui/index.html to /swagger-ui-custom.html 
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs